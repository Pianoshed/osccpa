<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | OSCCPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Standard Favicon -->
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/osccpa_logo.png') }}">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#5f4b8b;
      --light:#f5f2fb;
      --danger:#d9534f;
      --text:#333;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#f3eefb,#ffffff);
    }

    .login-wrapper{
      width:100%;
      max-width:400px;
      background:#fff;
      padding:40px 32px;
      border-radius:16px;
      box-shadow:0 15px 35px rgba(0,0,0,.12);
    }

    /* Logo */
    .login-logo{
      text-align:center;
      margin-bottom:20px;
    }

    .login-logo img{
      height:80px;
    }

    h2{
      text-align:center;
      margin-bottom:6px;
      color:var(--primary);
      font-weight:600;
    }

    .subtitle{
      text-align:center;
      font-size:14px;
      color:#666;
      margin-bottom:28px;
    }

    .form-group{
      margin-bottom:18px;
      position:relative;
    }

    .form-group input{
      width:100%;
      padding:12px 42px 12px 14px;
      border:1px solid #ddd;
      border-radius:8px;
      font-size:14px;
    }

    .form-group input:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(95,75,139,.15);
    }

    /* Show/Hide Toggle */
    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:13px;
      color:#777;
      user-select:none;
    }

    .login-btn{
      width:100%;
      padding:12px;
      background:var(--primary);
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:15px;
      font-weight:500;
      cursor:pointer;
      transition:.3s ease;
    }

    .login-btn:hover{
      background:#4c3a74;
    }

    .error-message{
      margin-top:16px;
      padding:10px;
      background:#fdecea;
      color:var(--danger);
      border-radius:8px;
      font-size:13px;
      text-align:center;
    }

    /* Back link */
    .back-link{
      text-align:center;
      margin-top:20px;
      font-size:13px;
    }

    .back-link a{
      text-decoration:none;
      color:var(--primary);
      font-weight:500;
    }

    .back-link a:hover{
      text-decoration:underline;
    }

    @media(max-width:480px){
      .login-wrapper{
        padding:32px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">

    <div class="login-logo">
      <img src="{{ url_for('static', filename='logo/osccpa_logo.png') }}" alt="OSCCPA Logo">
    </div>

    <h2>Admin Login</h2>
    <p class="subtitle">Authorized access only</p>

    <form method="POST">

      <div class="form-group">
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="form-group">
        <input type="password" id="password" name="password" placeholder="Password" required>
        <span class="toggle-password" onclick="togglePassword()">Show</span>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="error-message">
        {{ messages[0] }}
      </div>
    {% endif %}
    {% endwith %}

    <!-- Back to site -->
    <div class="back-link">
      <a href="/">← Back to OSCCPA Website</a>
    </div>

  </div>

  <script>
    function togglePassword(){
      const password = document.getElementById("password");
      const toggle = document.querySelector(".toggle-password");

      if(password.type === "password"){
        password.type = "text";
        toggle.textContent = "Hide";
      }else{
        password.type = "password";
        toggle.textContent = "Show";
      }
    }
  </script>

</body>
</html>
